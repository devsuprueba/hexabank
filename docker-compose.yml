version: "3.8"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:8.1.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:8.1.3
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hexabank
      POSTGRES_USER: hexabank
      POSTGRES_PASSWORD: hexabank
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  ms-client:
    build:
      context: ./ms-client
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hexabank
      SPRING_DATASOURCE_USERNAME: hexabank
      SPRING_DATASOURCE_PASSWORD: hexabank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka

  ms-account:
    build:
      context: ./ms-account
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hexabank
      SPRING_DATASOURCE_USERNAME: hexabank
      SPRING_DATASOURCE_PASSWORD: hexabank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka

volumes:
  db_data:
