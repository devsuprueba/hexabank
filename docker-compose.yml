services:
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo ruok | nc -w 3 localhost 2181 | grep imok || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 2>/dev/null; echo > /dev/tcp/localhost/9092' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command: |
      set -e
      echo "Waiting for Kafka broker..."
      for i in $(seq 1 120); do
        /usr/bin/kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1 && break || true
        sleep 1
      done
      echo "Creating topics (idempotent)..."
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --topic account-created --partitions 1 --replication-factor 1 || true
      /usr/bin/kafka-topics --bootstrap-server kafka:9092 --create --topic movement-created --partitions 1 --replication-factor 1 || true
      echo "kafka topics init completed"
    restart: "no"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: hexabank
      POSTGRES_USER: hexabank
      POSTGRES_PASSWORD: hexabank
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ms-client:
    build:
      context: ./ms-client
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hexabank
      SPRING_DATASOURCE_USERNAME: hexabank
      SPRING_DATASOURCE_PASSWORD: hexabank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    restart: unless-stopped

  ms-account:
    build:
      context: ./ms-account
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hexabank
      SPRING_DATASOURCE_USERNAME: hexabank
      SPRING_DATASOURCE_PASSWORD: hexabank
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - kafka
    restart: unless-stopped

volumes:
  db_data:
