spring.application.name=account

# Defaults that match docker-compose stack (can be overridden by env vars)
spring.datasource.url=jdbc:postgresql://postgres:5432/hexabank
# Kafka bootstrap server is provided at runtime via environment (docker-compose)
# spring.kafka.bootstrap-servers=kafka:9092

# Expose Actuator endpoints required by F21 (observability)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Do not expose sensitive details by default
management.endpoint.health.show-details=never

# Prometheus metrics are exposed via /actuator/prometheus when micrometer-registry-prometheus is on the classpath
